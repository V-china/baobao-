<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>微购相册 - 商品管理系统</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="header-content">
            <h1>📸 微购相册</h1>
            <div class="header-actions">
                <button class="btn-icon" id="addProductBtn">➕ 添加商品</button>
                <button class="btn-icon" id="myShopBtn">🏪 我的店铺</button>
                <button class="btn-icon" id="uploadPayQRBtn" style="background:#07c160">💰 收款码</button>
                <a class="btn-icon" href="shop.html" target="_blank" style="text-decoration:none;background:#ff4d4f">🛍️ 客户端</a>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="main-content">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-view="products">
                    <span class="nav-icon">📦</span>
                    <span>商品管理</span>
                </a>
                <a href="#" class="nav-item" data-view="albums">
                    <span class="nav-icon">🖼️</span>
                    <span>相册展示</span>
                </a>
                <a href="#" class="nav-item" data-view="forward">
                    <span class="nav-icon">📤</span>
                    <span>一键转发</span>
                </a>
                <a href="#" class="nav-item" data-view="friends">
                    <span class="nav-icon">👥</span>
                    <span>好友管理</span>
                </a>
                <a href="#" class="nav-item" data-view="orders">
                    <span class="nav-icon">📋</span>
                    <span>订单管理</span>
                    <span class="nav-badge" id="orderBadge" style="display:none">0</span>
                </a>
                <a href="#" class="nav-item" data-view="stats">
                    <span class="nav-icon">📊</span>
                    <span>数据统计</span>
                </a>
            </nav>
        </aside>

        <!-- 内容区域 -->
        <section class="content-area">
            <!-- 商品管理视图 -->
            <div id="productsView" class="view active">
                <div class="view-header">
                    <h2>商品管理</h2>
                    <div class="search-bar">
                        <input type="text" placeholder="搜索商品..." id="searchInput">
                        <button class="btn-search">🔍</button>
                    </div>
                </div>
                <div class="products-grid" id="productsGrid">
                    <!-- 商品卡片将通过JS动态生成 -->
                </div>
            </div>

            <!-- 相册展示视图 -->
            <div id="albumsView" class="view">
                <div class="view-header">
                    <h2>相册展示</h2>
                </div>
                <div class="albums-container" id="albumsContainer">
                    <!-- 相册内容 -->
                </div>
            </div>

            <!-- 一键转发视图 -->
            <div id="forwardView" class="view">
                <div class="view-header">
                    <h2>一键转发</h2>
                </div>
                <div class="forward-container">
                    <div class="forward-section">
                        <h3>选择要转发的商品</h3>
                        <div class="selected-products" id="selectedProducts">
                            <p class="empty-state">请先选择商品</p>
                        </div>
                    </div>
                    <div class="forward-section">
                        <h3>选择转发目标</h3>
                        <div class="forward-targets">
                            <button class="forward-btn" id="forwardToFriends">
                                <span class="forward-icon">👥</span>
                                <span>转发给好友</span>
                            </button>
                            <button class="forward-btn" id="forwardToShop">
                                <span class="forward-icon">🏪</span>
                                <span>转发到店铺</span>
                            </button>
                            <button class="forward-btn" id="copyLink">
                                <span class="forward-icon">🔗</span>
                                <span>复制链接</span>
                            </button>
                            <button class="forward-btn" id="generateQR">
                                <span class="forward-icon">📱</span>
                                <span>生成二维码</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 好友管理视图 -->
            <div id="friendsView" class="view">
                <div class="view-header">
                    <h2>好友管理</h2>
                    <button class="btn-primary" id="selectAllFriends">全选</button>
                </div>
                <div class="friends-list" id="friendsList">
                    <!-- 好友列表 -->
                </div>
            </div>

            <!-- 订单管理视图 -->
            <div id="ordersView" class="view">
                <div class="view-header">
                    <h2>订单管理</h2>
                </div>
                <div class="orders-container" id="ordersContainer">
                    <p class="empty-state">暂无订单</p>
                </div>
            </div>

            <!-- 数据统计视图 -->
            <div id="statsView" class="view">
                <div class="view-header">
                    <h2>数据统计</h2>
                </div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">📦</div>
                        <div class="stat-info">
                            <div class="stat-value" id="totalProducts">0</div>
                            <div class="stat-label">商品总数</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">👥</div>
                        <div class="stat-info">
                            <div class="stat-value" id="totalFriends">0</div>
                            <div class="stat-label">好友数量</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">📤</div>
                        <div class="stat-info">
                            <div class="stat-value" id="totalForwards">0</div>
                            <div class="stat-label">转发次数</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">💰</div>
                        <div class="stat-info">
                            <div class="stat-value" id="totalRevenue">¥0</div>
                            <div class="stat-label">总收益</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 添加商品弹窗 -->
    <div class="modal" id="addProductModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>添加商品</h3>
                <button class="modal-close" id="closeModal">✕</button>
            </div>
            <div class="modal-body">
                <form id="productForm">
                    <div class="form-group">
                        <label>商品名称</label>
                        <input type="text" id="productName" required placeholder="请输入商品名称">
                    </div>
                    <div class="form-group">
                        <label>商品价格</label>
                        <input type="number" id="productPrice" required placeholder="请输入价格" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>商品图片</label>
                        <input type="file" id="productImage" accept="image/*">
                        <div class="image-preview" id="imagePreview"></div>
                    </div>
                    <div class="form-group">
                        <label>商品描述</label>
                        <textarea id="productDesc" rows="4" placeholder="请输入商品描述"></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn-secondary" id="cancelBtn">取消</button>
                        <button type="submit" class="btn-primary">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 收款码上传弹窗 -->
    <div class="modal" id="payQRModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>上传微信收款码</h3>
                <button class="modal-close" id="closePayQRModal">✕</button>
            </div>
            <div class="modal-body">
                <p style="margin-bottom:16px;color:#666">上传后，客户端付款时将自动显示此收款码。</p>
                <div class="form-group">
                    <input type="file" id="payQRInput" accept="image/*">
                </div>
                <div class="image-preview" id="payQRPreview" style="min-height:200px"></div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" id="clearPayQR">清除</button>
                    <button type="button" class="btn-primary" id="savePayQR">保存收款码</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 转发成功提示 -->
    <div class="toast" id="toast"></div>

    <script src="app.js"></script>
</body>
</html>
